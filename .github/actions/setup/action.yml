name: Setup
description: Install Node, pin npm to the version in package.json#packageManager, and run npm ci

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: npm

    - name: Pin npm version
      shell: bash
      run: npm install -g "npm@$(node -p "require('./package.json').packageManager.split('@')[1]")"

    - name: Install dependencies
      shell: bash
      run: npm ci
